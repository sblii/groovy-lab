<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tilted Card - GROOVY</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <figure class="tilted-card-figure" id="tiltedCard">
            <div class="tilted-card-mobile-alert">This effect is optimized for desktop.</div>

            <div class="tilted-card-inner" id="cardInner">
                <img src="https://images.unsplash.com/photo-1514525253361-b83f859b73c0?q=80&w=1000&auto=format&fit=crop" 
                     alt="GROOVY Image" 
                     class="tilted-card-img">
                
                <div class="tilted-card-overlay">
                    <h2>GROOVY</h2>
                </div>
            </div>

            <figcaption class="tilted-card-caption" id="caption">
                GROOVY
            </figcaption>
        </figure>
    </div>

    <script src="script.js"></script>
</body>
</html>
